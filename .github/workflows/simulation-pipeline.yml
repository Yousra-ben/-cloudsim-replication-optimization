name: Pipeline CloudSim

on:
  workflow_dispatch:
    inputs:
      drift_id:
        description: 'ID du drift'
        required: true
        default: '1'

jobs:
  simulation:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - run: chmod +x build.sh run-simulation.sh
      
      - run: ./build.sh
      
      - run: ./run-simulation.sh
        env:
          DRIFT_ID: ${{ github.event.inputs.drift_id }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: results-drift-${{ github.event.inputs.drift_id }}
          path: results/
