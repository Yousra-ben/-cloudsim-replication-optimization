name: Pipeline CloudSim

on:
  workflow_dispatch:
    inputs:
      drift_id:
        description: 'ID du drift'
        required: true
        default: '1'

jobs:
  simulation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Installation Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Configuration Google Drive
        env:
          DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          # Sauvegarder les credentials
          echo "$DRIVE_CREDENTIALS" > /tmp/credentials.json
          echo "✅ Credentials configurés"
          echo "📁 Folder ID: $DRIVE_FOLDER_ID"
      
      - name: Exécution simulation
        run: |
          chmod +x run-simulation.sh
          ./run-simulation.sh
      
      - name: Upload résultats vers Google Drive
        uses: lychee-actions/lychee-upload@v1
        with:
          target: results/
          google_credentials: ${{ secrets.DRIVE_CREDENTIALS }}
          folder_id: ${{ secrets.DRIVE_FOLDER_ID }}
      
      - name: Sauvegarde artefacts
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results-drift-${{ github.event.inputs.drift_id }}
          path: results/
